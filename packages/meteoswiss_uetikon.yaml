          icon_code: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[4].iconDayV2 | int(0) if f and f | length > 4 else 0 }}

      - name: "Uetikon Vorhersage Tag 5"
        unique_id: uetikon_vorhersage_tag_5
        state: >
          {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
          {{ f[5].temperatureMax | int if f and f | length > 5 else 'unavailable' }}
        unit_of_measurement: "°C"
        attributes:
          wochentag: >
            {% set tage = ['Mo','Di','Mi','Do','Fr','Sa','So'] %}
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ tage[strptime(f[5].dayDate | string, '%Y%m%d').weekday()] if f and f | length > 5 else '--' }}
