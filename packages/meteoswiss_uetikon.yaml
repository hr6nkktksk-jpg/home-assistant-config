            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ tage[strptime(f[2].dayDate | string, '%Y%m%d').weekday()] if f and f | length > 2 else '--' }}
          min_temp: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[2].temperatureMin | int if f and f | length > 2 else '--' }}
          niederschlag: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[2].precipitation | float(0) | round(1) if f and f | length > 2 else 0 }}
          icon_code: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[2].iconDayV2 | int(0) if f and f | length > 2 else 0 }}

      - name: "Uetikon Vorhersage Tag 3"
        unique_id: uetikon_vorhersage_tag_3
        state: >
          {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
          {{ f[3].temperatureMax | int if f and f | length > 3 else 'unavailable' }}
        unit_of_measurement: "°C"
        attributes:
          wochentag: >
            {% set tage = ['Mo','Di','Mi','Do','Fr','Sa','So'] %}
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ tage[strptime(f[3].dayDate | string, '%Y%m%d').weekday()] if f and f | length > 3 else '--' }}
          min_temp: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[3].temperatureMin | int if f and f | length > 3 else '--' }}
          niederschlag: >
