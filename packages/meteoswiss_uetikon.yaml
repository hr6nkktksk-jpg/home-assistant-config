            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ tage[strptime(f[1].dayDate | string, '%Y%m%d').weekday()] if f and f | length > 1 else '--' }}
          min_temp: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[1].temperatureMin | int if f and f | length > 1 else '--' }}
          niederschlag: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[1].precipitation | float(0) | round(1) if f and f | length > 1 else 0 }}
          icon_code: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[1].iconDayV2 | int(0) if f and f | length > 1 else 0 }}

