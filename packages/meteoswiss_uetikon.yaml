        unique_id: uetikon_vorhersage_tag_6
        state: >
          {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
          {{ f[6].temperatureMax | int if f and f | length > 6 else 'unavailable' }}
        unit_of_measurement: "°C"
        attributes:
          wochentag: >
            {% set tage = ['Mo','Di','Mi','Do','Fr','Sa','So'] %}
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ tage[strptime(f[6].dayDate | string, '%Y%m%d').weekday()] if f and f | length > 6 else '--' }}
          min_temp: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[6].temperatureMin | int if f and f | length > 6 else '--' }}
          niederschlag: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[6].precipitation | float(0) | round(1) if f and f | length > 6 else 0 }}
          icon_code: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[6].iconDayV2 | int(0) if f and f | length > 6 else 0 }}

      # ── Warnungen ─────────────────────────────────────────────────────────

      - name: "Uetikon Warnung Text"
        unique_id: uetikon_warnung_text
        state: >
          {% set w = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'warnings') %}
          {% if w and w | length > 0 %}
            {{ w | map(attribute='text') | list | join(' | ') }}
          {% else %}
            Keine Warnungen aktiv
          {% endif %}
        icon: >
          {% set w = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'warnings') %}
          {{ 'mdi:alert-circle' if w and w | length > 0 else 'mdi:shield-check' }}

  - binary_sensor:
      - name: "Uetikon Wetterwarnung Aktiv"
        unique_id: uetikon_wetterwarnung_aktiv
        state: >
          {% set w = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'warnings') %}
          {{ w is not none and w | length > 0 }}
        device_class: safety
        icon: >
          {% if is_state('binary_sensor.uetikon_wetterwarnung_aktiv', 'on') %}
            mdi:alert-circle
          {% else %}
            mdi:shield-check
          {% endif %}
