          icon_code: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[3].iconDayV2 | int(0) if f and f | length > 3 else 0 }}

      - name: "Uetikon Vorhersage Tag 4"
        unique_id: uetikon_vorhersage_tag_4
        state: >
          {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
          {{ f[4].temperatureMax | int if f and f | length > 4 else 'unavailable' }}
        unit_of_measurement: "°C"
        attributes:
          wochentag: >
            {% set tage = ['Mo','Di','Mi','Do','Fr','Sa','So'] %}
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ tage[strptime(f[4].dayDate | string, '%Y%m%d').weekday()] if f and f | length > 4 else '--' }}
          min_temp: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
            {{ f[4].temperatureMin | int if f and f | length > 4 else '--' }}
          niederschlag: >
            {% set f = state_attr('sensor.meteoswiss_uetikon_rohdaten', 'forecast') %}
